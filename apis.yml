aid: targa-resources
name: Targa Resources
description: >-
  Targa Resources Corp. is a Fortune 500 and S&P 500 midstream energy
  infrastructure company and one of the largest independent midstream companies
  in North America. The company provides midstream services including gathering,
  compression, treating, processing, and selling of natural gas; fractionating,
  treating, transporting, and selling of natural gas liquids (NGLs); gathering,
  storing, terminaling and selling crude oil; and storing and selling refined
  petroleum products. Targa operates primarily in the Permian Basin, Anadarko
  Basin, and South Texas production areas, and owns the Grand Prix NGL Pipeline.
